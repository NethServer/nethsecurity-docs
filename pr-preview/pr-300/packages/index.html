<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NethSecurity package browser</title>
    <link rel="stylesheet" href="browser.css" />
  </head>
  <body
    data-bucket="nethsecurity"
    data-endpoint="https://ams3.digitaloceanspaces.com"
    data-cdn-endpoint="https://updates.nethsecurity.nethserver.org"
    data-docs-home="/"
    data-download-page="/administrator-manual/installation/download"
  >
    <noscript>
      <main class="app-shell">
        <section class="panel panel-noscript">
          <h1>NethSecurity package browser</h1>
          <p>
            This page requires JavaScript to browse the public repository.
            You can still use the <a href="/administrator-manual/installation/download">download page</a>
            to access the release tables.
          </p>
        </section>
      </main>
    </noscript>

    <div id="root"></div>
    <script src="browser.js" defer></script>
  </body>
</html>
