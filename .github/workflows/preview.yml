name: PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write # push the preview to gh-pages
  pull-requests: write # comment the preview URL on the PR

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview:
    name: Deploy PR preview
    # Skip fork PRs: their read-only GITHUB_TOKEN cannot push to gh-pages.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: yarn install --frozen-lockfile
      - name: Build website
        if: github.event.action != 'closed'
        env:
          NODE_ENV: production
          BASE_URL: /pr-preview/pr-${{ github.event.number }}/
        run: yarn build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build
          preview-branch: gh-pages
          umbrella-dir: pr-preview
