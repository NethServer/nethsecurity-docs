name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # to push to the gh-pages branch

jobs:
  build-and-deploy:
    name: Build and deploy Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # `yarn build` runs the prebuild script that fetches the latest
      # NethSecurity version and download tables, then builds the static site.
      - name: Build
        run: yarn build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          cname: docs.nethsecurity.org
          keep_files: true # preserve pr-preview/ subdirs created by PR previews
